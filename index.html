<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CBinCSV</title>
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #141B27;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 28px;
        cursor: pointer;
        transition: opacity 0.35s ease;
      }
      #splash.hiding { opacity: 0; pointer-events: none; }
      #splash-logo { width: 220px; height: auto; object-fit: contain; }
      #splash-bar-wrap {
        width: 180px; height: 2px;
        background: #213247; border-radius: 2px; overflow: hidden;
      }
      #splash-fill { height: 100%; background: #5BA3E0; width: 0; }
      #splash-hint {
        font-size: 10px; color: #354C66;
        letter-spacing: 0.07em; text-transform: uppercase;
        position: absolute; bottom: 20px;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="splash">
      <img id="splash-logo" src="/logo.png" alt="CBinCSV" />
      <div id="splash-bar-wrap"><div id="splash-fill"></div></div>
      <span id="splash-hint">click to skip</span>
    </div>

    <script>
      (function () {
        var splash = document.getElementById('splash');
        var fill   = document.getElementById('splash-fill');

        if (localStorage.getItem('showSplash') === 'false') {
          splash.remove();
          return;
        }

        var done = false;
        function hide() {
          if (done) return;
          done = true;
          splash.classList.add('hiding');
          setTimeout(function () { splash.remove(); }, 380);
        }

        var start = Date.now();
        var DURATION = 2000;
        function tick() {
          var p = Math.min((Date.now() - start) / DURATION * 100, 100);
          fill.style.width = p + '%';
          if (p < 100) { requestAnimationFrame(tick); } else { hide(); }
        }
        requestAnimationFrame(tick);

        splash.addEventListener('click', hide);
      })();
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
